name: PokeAuto Windows x64

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source and submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Restore source dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (-not (Test-Path "RAInterface\RA_Interface.cpp")) {
            Remove-Item RAInterface -Recurse -Force -ErrorAction SilentlyContinue
            git clone --depth 1 https://github.com/RetroAchievements/RAInterface.git RAInterface
          }

          if (-not (Test-Path "dependencies\mingw-xaudio\include")) {
            Remove-Item dependencies -Recurse -Force -ErrorAction SilentlyContinue
            git clone --depth 1 --recursive https://github.com/visualboyadvance-m/dependencies.git dependencies
          }

      - name: Prepare Visual Studio
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64

      - name: Prepare isolated vcpkg and install SDL2
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg-pokeauto"

          Remove-Item $vcpkgRoot -Recurse -Force -ErrorAction SilentlyContinue

          git clone --depth 1 https://github.com/microsoft/vcpkg.git $vcpkgRoot

          & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics

          & "$vcpkgRoot\vcpkg.exe" install `
            "sdl2[samplerate]:x64-windows-static" `
            --disable-metrics

          if ($LASTEXITCODE -ne 0) {
            throw "SDL2 installation failed: $LASTEXITCODE"
          }

          "VCPKG_ROOT=$vcpkgRoot" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure RAVBA
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DENABLE_SDL=TRUE `
            -DENABLE_RETROACHIEVEMENTS=TRUE `
            -DENABLE_FFMPEG=FALSE `
            -DENABLE_ONLINEUPDATES=FALSE

          if ($LASTEXITCODE -ne 0) {
            throw "CMake configuration failed: $LASTEXITCODE"
          }

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel

          if ($LASTEXITCODE -ne 0) {
            throw "Build failed: $LASTEXITCODE"
          }

      - name: Assemble package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Force package | Out-Null

          $exe = Get-ChildItem build -Recurse `
            -Filter RAVisualBoyAdvance-M.exe |
            Select-Object -First 1

          if (-not $exe) {
            $exe = Get-ChildItem build -Recurse `
              -Filter visualboyadvance-m.exe |
              Select-Object -First 1
          }

          if (-not $exe) {
            throw "RAVBA executable was not generated"
          }

          Copy-Item $exe.FullName package\ -Force

          Get-ChildItem build -Recurse -File |
            Where-Object {
              $_.Name -in @(
                "RA_Integration.dll",
                "RA_Integration-x64.dll",
                "translations.zip"
              )
            } |
            ForEach-Object {
              Copy-Item $_.FullName package\ -Force
            }

          Copy-Item extras\pokeauto\README-PTBR.md package\ -Force
          Copy-Item extras\pokeauto\firered_starter_sequence_10x.json package\ -Force

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: RAVBA-PokeAuto-x64
          path: package